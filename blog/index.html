<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<title>Blog · BryantChang</title>
<style>
  :root {
    --bg: #09090b;
    --surface: #18181b;
    --border: #27272a;
    --text: #fafafa;
    --muted: #a1a1aa;
    --dim: #71717a;
    --accent: #22d3ee;
    --accent2: #818cf8;
    --accent3: #f472b6;
    --accent4: #34d399;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }

  .global-nav {
    display: flex;
    align-items: center;
    gap: 0;
    padding: 0 24px;
    background: rgba(9,9,11,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    height: 52px;
  }
  .global-nav .brand {
    font-weight: 700;
    font-size: 0.95rem;
    color: var(--text);
    text-decoration: none;
    margin-right: 28px;
    white-space: nowrap;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .global-nav .nav-links {
    display: flex;
    gap: 4px;
    overflow-x: auto;
    flex: 1;
  }
  .global-nav .nav-link {
    color: var(--muted);
    text-decoration: none;
    font-size: 0.88rem;
    padding: 6px 14px;
    border-radius: 8px;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
  }
  .global-nav .nav-link:hover {
    background: var(--surface);
    color: var(--text);
  }
  .global-nav .nav-link.active {
    background: var(--surface);
    color: var(--accent);
    font-weight: 500;
  }

  .hero {
    text-align: center;
    padding: 60px 20px 40px;
    background: linear-gradient(180deg, rgba(244,114,182,0.04) 0%, transparent 100%);
    border-bottom: 1px solid var(--border);
  }
  .hero h1 {
    font-size: 2.2rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, var(--accent3), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }
  .hero .tagline {
    color: var(--muted);
    font-size: 1rem;
  }

  .container {
    max-width: 800px;
    margin: 0 auto;
    padding: 32px 20px 60px;
  }

  .article-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px 32px;
    text-decoration: none;
    color: var(--text);
    display: block;
    transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
    margin-bottom: 20px;
  }
  .article-card:hover {
    border-color: rgba(255,255,255,0.15);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
  }
  .article-card .article-date {
    font-size: 0.8rem;
    color: var(--dim);
    margin-bottom: 8px;
  }
  .article-card .article-title {
    font-size: 1.25rem;
    font-weight: 700;
    margin-bottom: 8px;
    background: linear-gradient(135deg, var(--text), var(--muted));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .article-card .article-desc {
    color: var(--muted);
    font-size: 0.92rem;
    margin-bottom: 12px;
  }
  .article-card .article-tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .article-card .tag {
    font-size: 0.75rem;
    color: var(--accent);
    background: rgba(34,211,238,0.1);
    padding: 2px 10px;
    border-radius: 12px;
    border: 1px solid rgba(34,211,238,0.2);
  }

  .about {
    margin-top: 40px;
    padding-top: 32px;
    border-top: 1px solid var(--border);
    text-align: center;
    color: var(--dim);
    font-size: 0.85rem;
  }
  .about a {
    color: var(--accent);
    text-decoration: none;
  }
  .about a:hover { text-decoration: underline; }

  @media (max-width: 600px) {
    .hero { padding: 40px 16px 28px; }
    .hero h1 { font-size: 1.6rem; }
    .container { padding: 20px 16px 40px; }
    .article-card { padding: 20px 24px; }
  }
</style>
</head>

    <div class="article-desc">当所有人都在抢 GPU 的时候，聪明的人在修水管。深入剖析 AI 训练数据管道的六层全景架构、特征穿越与数据漂移的本质、以及为什么数据管道才是 AI 时代真正的护城河。</div>
    <div class="article-tags">
