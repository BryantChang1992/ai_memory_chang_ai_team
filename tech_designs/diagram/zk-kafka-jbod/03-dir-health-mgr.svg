<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 860">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow-slate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-rose" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb7185"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
    <marker id="arrow-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
    text {
      font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif;
    }
  </style>

  <!-- Layer 1: Background -->
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Layer 2: Title block -->
  <text x="28" y="34" fill="#f8fafc" font-size="16" font-weight="700">DirectoryHealthManager 组件架构</text>
  <text x="370" y="34" fill="#fbbf24" font-size="12" font-weight="500">[新增]</text>
  <text x="28" y="56" fill="#64748b" font-size="10">exploded view — 内部模块 &amp; 外部接口</text>

  <!-- Layer 3: Central region boundary -->
  <rect x="245" y="100" width="810" height="530" rx="14" fill="rgba(6,78,59,0.06)" stroke="#34d399" stroke-width="1.2" stroke-dasharray="10,5"/>
  <rect x="245" y="100" width="810" height="22" rx="14" fill="rgba(6,78,59,0.25)"/>
  <rect x="245" y="108" width="810" height="14" fill="rgba(6,78,59,0.25)"/>
  <text x="650" y="116" fill="#34d399" font-size="10" font-weight="600" text-anchor="middle">DirectoryHealthManager</text>

  <!-- Layer 4: Connection lines and arrows -->

  <!-- Arrow 1: LogDirFailureChannel → 磁盘健康监控器 (rose) -->
  <path d="M 205 394 L 235 394 L 235 205 L 275 205"
        fill="none" stroke="#fb7185" stroke-width="1.6" stroke-dasharray="6,3" marker-end="url(#arrow-rose)"/>
  <text x="252" y="302" fill="#fb7185" font-size="8" text-anchor="middle">I/O 错误通知</text>

  <!-- Arrow 2: Admin API → Cordon/Uncordon处理器 (cyan) — go above region, through the top gap -->
  <path d="M 117.5 238 L 117.5 200 L 640 200 L 640 320"
        fill="none" stroke="#22d3ee" stroke-width="1.6" marker-end="url(#arrow-cyan)"/>
  <text x="380" y="193" fill="#22d3ee" font-size="8" text-anchor="middle">管理命令 (kafka-configs.sh / REST)</text>

  <!-- Arrow 3: Cordon/Uncordon处理器 → 状态管理器 (going up from bottom row to top row left of center) -->
  <path d="M 640 320 L 640 240"
        fill="none" stroke="#64748b" stroke-width="1.4" marker-end="url(#arrow-slate)"/>
  <text x="655" y="283" fill="#64748b" font-size="7">更新状态</text>

  <!-- Arrow 4: 磁盘健康监控器 → 状态管理器 -->
  <path d="M 495 205 L 525 205"
        fill="none" stroke="#64748b" stroke-width="1.4" marker-end="url(#arrow-slate)"/>
  <text x="510" y="198" fill="#64748b" font-size="7" text-anchor="middle">状态变更</text>

  <!-- Arrow 5: 磁盘健康监控器 → 恢复检测器 — route along bottom edge of top row modules -->
  <path d="M 385 240 L 385 260 L 905 260 L 905 320"
        fill="none" stroke="#64748b" stroke-width="1.4" marker-end="url(#arrow-slate)"/>
  <text x="645" y="255" fill="#64748b" font-size="7" text-anchor="middle">故障目录信息</text>

  <!-- Arrow 6: 恢复检测器 → 状态管理器 — go up-divert left through dedicated lane -->
  <path d="M 785 355 L 750 355 L 750 240 L 755 240"
        fill="none" stroke="#34d399" stroke-width="1.4" marker-end="url(#arrow-emerald)"/>
  <text x="730" y="300" fill="#34d399" font-size="7">恢复完成 OFFLINE→ONLINE</text>

  <!-- Arrow 7: 状态管理器 → ZK上报器 -->
  <path d="M 755 205 L 785 205"
        fill="none" stroke="#64748b" stroke-width="1.4" marker-end="url(#arrow-slate)"/>

  <!-- Arrow 8: 状态管理器 → 事件发射器 — go down along left side of status mgr -->
  <path d="M 640 240 L 640 310 L 385 310 L 385 320"
        fill="none" stroke="#64748b" stroke-width="1.4" marker-end="url(#arrow-slate)"/>
  <text x="510" y="305" fill="#64748b" font-size="7" text-anchor="middle">触发事件通知</text>

  <!-- Arrow 9: ZK上报器 → ZK Client -->
  <path d="M 1025 205 L 1085 205 L 1085 394 L 1095 394"
        fill="none" stroke="#a78bfa" stroke-width="1.6" marker-end="url(#arrow-violet)"/>
  <text x="1090" y="300" fill="#a78bfa" font-size="8" text-anchor="middle">写入 JSON</text>
  <text x="1090" y="312" fill="#a78bfa" font-size="7" text-anchor="middle">/brokers/dirs/{brokerId}</text>

  <!-- Arrow 10: 事件发射器 → ZK Client — go right along bottom then up at right edge -->
  <path d="M 495 355 L 1060 355 L 1060 394 L 1095 394"
        fill="none" stroke="#a78bfa" stroke-width="1.6" marker-end="url(#arrow-violet)"/>
  <text x="775" y="345" fill="#a78bfa" font-size="8" text-anchor="middle">写入 sequence znode → /log_dir_event_notification</text>

  <!-- Arrow 11: ZK Client → Controller -->
  <path d="M 1182.5 380 L 1182.5 248"
        fill="none" stroke="#fbbf24" stroke-width="1.6" marker-end="url(#arrow-amber)"/>
  <text x="1196" y="316" fill="#fbbf24" font-size="8">ZK Watch 通知</text>

  <!-- Layer 5: Opaque masking rects -->

  <!-- ZK Client mask — extends far enough to mask Arrow 10 horizontal segment -->
  <rect x="1095" y="330" width="175" height="93" rx="7" fill="#0f172a"/>

  <!-- External: Admin API -->
  <rect x="30" y="180" width="175" height="58" rx="7" fill="#0f172a" filter="url(#shadow)"/>
  <rect x="30" y="180" width="175" height="58" rx="7" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="117.5" y="205" fill="#fbbf24" font-size="11" font-weight="600" text-anchor="middle">Admin API</text>
  <text x="117.5" y="223" fill="#94a3b8" font-size="9" text-anchor="middle">kafka-configs.sh / REST</text>

  <!-- External: Controller -->
  <rect x="1095" y="180" width="175" height="58" rx="7" fill="#0f172a" filter="url(#shadow)"/>
  <rect x="1095" y="180" width="175" height="58" rx="7" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="1182.5" y="205" fill="#fbbf24" font-size="11" font-weight="600" text-anchor="middle">Controller</text>
  <text x="1182.5" y="223" fill="#94a3b8" font-size="9" text-anchor="middle">监听 ZK 通知</text>

  <!-- External: LogDirFailureChannel -->
  <rect x="30" y="365" width="175" height="58" rx="7" fill="#0f172a" filter="url(#shadow)"/>
  <rect x="30" y="365" width="175" height="58" rx="7" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="117.5" y="390" fill="#fb7185" font-size="11" font-weight="600" text-anchor="middle">LogDirFailureChannel</text>
  <text x="117.5" y="408" fill="#94a3b8" font-size="9" text-anchor="middle">I/O 错误通道 [已有]</text>

  <!-- External: ZooKeeper Client -->
  <rect x="1095" y="365" width="175" height="58" rx="7" fill="#0f172a" filter="url(#shadow)"/>
  <rect x="1095" y="365" width="175" height="58" rx="7" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="1182.5" y="390" fill="#a78bfa" font-size="11" font-weight="600" text-anchor="middle">ZooKeeper Client</text>
  <text x="1182.5" y="408" fill="#94a3b8" font-size="9" text-anchor="middle">ZK 读写操作</text>

  <!-- Internal Module masks -->
  <rect x="275" y="170" width="220" height="70" rx="7" fill="#0f172a"/>
  <rect x="525" y="170" width="230" height="70" rx="7" fill="#0f172a"/>
  <rect x="785" y="170" width="240" height="70" rx="7" fill="#0f172a"/>
  <rect x="275" y="320" width="220" height="70" rx="7" fill="#0f172a"/>
  <rect x="525" y="320" width="230" height="70" rx="7" fill="#0f172a"/>
  <rect x="785" y="320" width="240" height="70" rx="7" fill="#0f172a"/>

  <!-- Internal Module 1: 磁盘健康监控器 -->
  <rect x="275" y="170" width="220" height="70" rx="7" fill="rgba(6,78,59,0.35)" stroke="#34d399" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="385" y="196" fill="white" font-size="11" font-weight="600" text-anchor="middle">磁盘健康监控器</text>
  <text x="385" y="216" fill="#94a3b8" font-size="9" text-anchor="middle">定期检查 log.dirs</text>
  <text x="385" y="230" fill="#64748b" font-size="7" text-anchor="middle">LogDirFailureChannel 检测 I/O 错误</text>

  <!-- Internal Module 2: 状态管理器 -->
  <rect x="525" y="170" width="230" height="70" rx="7" fill="rgba(6,78,59,0.35)" stroke="#34d399" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="640" y="196" fill="white" font-size="11" font-weight="600" text-anchor="middle">状态管理器</text>
  <text x="640" y="216" fill="#94a3b8" font-size="9" text-anchor="middle">内存目录状态机</text>
  <text x="640" y="230" fill="#64748b" font-size="7" text-anchor="middle">ONLINE / OFFLINE / CORDONED / DISABLED</text>

  <!-- Internal Module 3: ZK上报器 -->
  <rect x="785" y="170" width="240" height="70" rx="7" fill="rgba(6,78,59,0.35)" stroke="#34d399" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="905" y="196" fill="white" font-size="11" font-weight="600" text-anchor="middle">ZK 上报器</text>
  <text x="905" y="216" fill="#94a3b8" font-size="9" text-anchor="middle">写入目录状态 JSON</text>
  <text x="905" y="230" fill="#64748b" font-size="7" text-anchor="middle">/brokers/dirs/{brokerId}</text>

  <!-- Internal Module 4: 事件发射器 -->
  <rect x="275" y="320" width="220" height="70" rx="7" fill="rgba(6,78,59,0.35)" stroke="#34d399" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="385" y="346" fill="white" font-size="11" font-weight="600" text-anchor="middle">事件发射器</text>
  <text x="385" y="366" fill="#94a3b8" font-size="9" text-anchor="middle">写入 sequence znode</text>
  <text x="385" y="380" fill="#64748b" font-size="7" text-anchor="middle">/log_dir_event_notification</text>

  <!-- Internal Module 5: Cordon/Uncordon处理器 -->
  <rect x="525" y="320" width="230" height="70" rx="7" fill="rgba(6,78,59,0.35)" stroke="#34d399" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="640" y="346" fill="white" font-size="11" font-weight="600" text-anchor="middle">Cordon/Uncordon 处理器</text>
  <text x="640" y="366" fill="#94a3b8" font-size="9" text-anchor="middle">处理管理员命令</text>
  <text x="640" y="380" fill="#64748b" font-size="7" text-anchor="middle">kafka-configs.sh / REST API</text>

  <!-- Internal Module 6: 恢复检测器 -->
  <rect x="785" y="320" width="240" height="70" rx="7" fill="rgba(6,78,59,0.35)" stroke="#34d399" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="905" y="346" fill="white" font-size="11" font-weight="600" text-anchor="middle">恢复检测器</text>
  <text x="905" y="366" fill="#94a3b8" font-size="9" text-anchor="middle">轮询故障目录</text>
  <text x="905" y="380" fill="#64748b" font-size="7" text-anchor="middle">自动 OFFLINE → ONLINE</text>

  <!-- Layer 6: Module index labels -->
  <circle cx="263" cy="178" r="8" fill="#34d399"/>
  <text x="263" y="182" fill="#0f172a" font-size="9" font-weight="700" text-anchor="middle">1</text>
  <circle cx="513" cy="178" r="8" fill="#34d399"/>
  <text x="513" y="182" fill="#0f172a" font-size="9" font-weight="700" text-anchor="middle">2</text>
  <circle cx="773" cy="178" r="8" fill="#34d399"/>
  <text x="773" y="182" fill="#0f172a" font-size="9" font-weight="700" text-anchor="middle">3</text>
  <circle cx="263" cy="328" r="8" fill="#34d399"/>
  <text x="263" y="332" fill="#0f172a" font-size="9" font-weight="700" text-anchor="middle">4</text>
  <circle cx="513" cy="328" r="8" fill="#34d399"/>
  <text x="513" y="332" fill="#0f172a" font-size="9" font-weight="700" text-anchor="middle">5</text>
  <circle cx="773" cy="328" r="8" fill="#34d399"/>
  <text x="773" y="332" fill="#0f172a" font-size="9" font-weight="700" text-anchor="middle">6</text>

  <!-- Layer 7: Legend -->
  <g transform="translate(28, 700)">
    <rect x="0" y="0" width="620" height="130" rx="8" fill="rgba(15,23,42,0.8)" stroke="#334155" stroke-width="1"/>
    <text x="15" y="20" fill="#94a3b8" font-size="10" font-weight="600">图例</text>
    <rect x="15" y="32" width="16" height="12" rx="3" fill="rgba(6,78,59,0.35)" stroke="#34d399" stroke-width="1"/>
    <text x="38" y="43" fill="#94a3b8" font-size="9">内部模块 (DirectoryHealthManager)</text>
    <rect x="290" y="32" width="16" height="12" rx="3" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1"/>
    <text x="313" y="43" fill="#94a3b8" font-size="9">外部接口 (Admin / Controller)</text>
    <rect x="15" y="54" width="16" height="12" rx="3" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1"/>
    <text x="38" y="65" fill="#94a3b8" font-size="9">I/O 错误通道 (已存在)</text>
    <rect x="290" y="54" width="16" height="12" rx="3" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1"/>
    <text x="313" y="65" fill="#94a3b8" font-size="9">ZooKeeper Client (存储/通知)</text>
    <line x1="15" y1="85" x2="50" y2="85" stroke="#64748b" stroke-width="1.4" marker-end="url(#arrow-slate)"/>
    <text x="60" y="89" fill="#94a3b8" font-size="9">组件间数据流</text>
    <line x1="15" y1="105" x2="50" y2="105" stroke="#fb7185" stroke-width="1.6" stroke-dasharray="6,3" marker-end="url(#arrow-rose)"/>
    <text x="60" y="109" fill="#94a3b8" font-size="9">错误通知流</text>
    <line x1="230" y1="85" x2="265" y2="85" stroke="#a78bfa" stroke-width="1.6" marker-end="url(#arrow-violet)"/>
    <text x="275" y="89" fill="#94a3b8" font-size="9">ZK 读写</text>
    <line x1="230" y1="105" x2="265" y2="105" stroke="#fbbf24" stroke-width="1.6" marker-end="url(#arrow-amber)"/>
    <text x="275" y="109" fill="#94a3b8" font-size="9">Controller 通知</text>
    <rect x="400" y="32" width="40" height="12" rx="4" fill="none" stroke="#34d399" stroke-width="1" stroke-dasharray="8,4"/>
    <text x="448" y="43" fill="#94a3b8" font-size="9">组件边界</text>
  </g>

  <text x="28" y="680" fill="#64748b" font-size="9">注：虚线箭头表示异步/I/O 通道；实线箭头表示同步调用或状态传递</text>
</svg>