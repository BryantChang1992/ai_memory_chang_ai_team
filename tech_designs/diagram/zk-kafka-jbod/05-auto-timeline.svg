<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 700">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow-rose" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb7185"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
    <marker id="arrow-slate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <filter id="glow-rose" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
    text {
      font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }
  </style>

  <!-- Background -->
  <rect width="1500" height="700" fill="#0f172a"/>
  <rect width="1500" height="700" fill="url(#grid)"/>

  <!-- Title -->
  <text x="750" y="44" fill="#f1f5f9" font-size="20" font-weight="700" text-anchor="middle" letter-spacing="2">⏱ 自动故障处理完整时间线</text>
  <text x="750" y="66" fill="#64748b" font-size="11" font-weight="400" text-anchor="middle">Kafka Broker 磁盘故障 → ZK 协调 → Controller 自动恢复</text>

  <!-- TIME AXIS -->
  <line x1="180" y1="105" x2="1320" y2="105" stroke="#475569" stroke-width="2"/>
  <line x1="210" y1="95" x2="210" y2="115" stroke="#fb7185" stroke-width="2.5" filter="url(#glow-rose)"/>
  <circle cx="210" cy="105" r="6" fill="#0f172a" stroke="#fb7185" stroke-width="2.5" filter="url(#glow-rose)"/>
  <text x="210" y="85" fill="#fb7185" font-size="12" font-weight="700" text-anchor="middle">T+0</text>

  <line x1="390" y1="98" x2="390" y2="112" stroke="#fbbf24" stroke-width="2"/>
  <circle cx="390" cy="105" r="5" fill="#0f172a" stroke="#fbbf24" stroke-width="2"/>
  <text x="390" y="85" fill="#fbbf24" font-size="11" font-weight="600" text-anchor="middle">T+~1s</text>

  <line x1="570" y1="98" x2="570" y2="112" stroke="#60a5fa" stroke-width="2"/>
  <circle cx="570" cy="105" r="5" fill="#0f172a" stroke="#60a5fa" stroke-width="2"/>
  <text x="570" y="85" fill="#60a5fa" font-size="11" font-weight="600" text-anchor="middle">T+~2s</text>

  <line x1="790" y1="98" x2="790" y2="112" stroke="#22d3ee" stroke-width="2"/>
  <circle cx="790" cy="105" r="5" fill="#0f172a" stroke="#22d3ee" stroke-width="2"/>
  <text x="790" y="85" fill="#22d3ee" font-size="11" font-weight="600" text-anchor="middle">T+~30s</text>

  <line x1="1030" y1="95" x2="1030" y2="115" stroke="#34d399" stroke-width="2.5" filter="url(#glow-green)"/>
  <circle cx="1030" cy="105" r="6" fill="#0f172a" stroke="#34d399" stroke-width="2.5" filter="url(#glow-green)"/>
  <text x="1030" y="85" fill="#34d399" font-size="12" font-weight="700" text-anchor="middle">T+~5min</text>

  <line x1="1270" y1="95" x2="1270" y2="115" stroke="#fb7185" stroke-width="2.5" filter="url(#glow-rose)"/>
  <circle cx="1270" cy="105" r="6" fill="#0f172a" stroke="#fb7185" stroke-width="2.5" filter="url(#glow-rose)"/>
  <text x="1270" y="85" fill="#fb7185" font-size="12" font-weight="700" text-anchor="middle">T+N</text>

  <!-- Vertical dotted guidelines -->
  <line x1="210" y1="135" x2="210" y2="560" stroke="#fb7185" stroke-width="0.8" stroke-dasharray="4,6" opacity="0.25"/>
  <line x1="390" y1="135" x2="390" y2="560" stroke="#fbbf24" stroke-width="0.8" stroke-dasharray="4,6" opacity="0.25"/>
  <line x1="570" y1="135" x2="570" y2="560" stroke="#60a5fa" stroke-width="0.8" stroke-dasharray="4,6" opacity="0.25"/>
  <line x1="790" y1="135" x2="790" y2="560" stroke="#22d3ee" stroke-width="0.8" stroke-dasharray="4,6" opacity="0.25"/>
  <line x1="1030" y1="135" x2="1030" y2="560" stroke="#34d399" stroke-width="0.8" stroke-dasharray="4,6" opacity="0.25"/>
  <line x1="1270" y1="135" x2="1270" y2="560" stroke="#fb7185" stroke-width="0.8" stroke-dasharray="4,6" opacity="0.25"/>

  <!-- ===== LANE 1: BROKER ===== -->
  <rect x="160" y="135" width="1180" height="135" rx="8" fill="rgba(30,41,59,0.3)" stroke="#334155" stroke-width="1"/>

  <!-- Lane label -->
  <rect x="20" y="168" width="120" height="68" rx="6" fill="rgba(8,51,68,0.5)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="80" y="197" fill="#22d3ee" font-size="13" font-weight="700" text-anchor="middle">Broker</text>
  <text x="80" y="217" fill="#94a3b8" font-size="10" text-anchor="middle">操作</text>

  <!-- T+0: 磁盘 I/O 错误 -->
  <rect x="178" y="152" width="200" height="100" rx="8" fill="#0f172a"/>
  <rect x="178" y="152" width="200" height="100" rx="8" fill="rgba(136,19,55,0.35)" stroke="#fb7185" stroke-width="2"/>
  <text x="278" y="173" fill="#fb7185" font-size="10" font-weight="700" text-anchor="middle">🔴 磁盘 I/O 错误检测</text>
  <line x1="196" y1="182" x2="360" y2="182" stroke="#fb7185" stroke-width="0.5" opacity="0.4"/>
  <text x="278" y="198" fill="#fca5a5" font-size="9" font-weight="500" text-anchor="middle">LogDirFailureChannel 触发</text>
  <text x="278" y="218" fill="#fca5a5" font-size="9" font-weight="500" text-anchor="middle">↓</text>
  <text x="278" y="240" fill="#fb7185" font-size="10" font-weight="700" text-anchor="middle">DirectoryHealthManager</text>
  <text x="278" y="254" fill="#fb7185" font-size="9" font-weight="700" text-anchor="middle">标记 → OFFLINE</text>

  <!-- T+~1s: 写入 ZK -->
  <rect x="312" y="152" width="200" height="100" rx="8" fill="#0f172a"/>
  <rect x="312" y="152" width="200" height="100" rx="8" fill="rgba(120,53,15,0.25)" stroke="#fbbf24" stroke-width="1.8"/>
  <text x="412" y="173" fill="#fbbf24" font-size="10" font-weight="700" text-anchor="middle">📤 写入 ZK</text>
  <line x1="330" y1="182" x2="494" y2="182" stroke="#fbbf24" stroke-width="0.5" opacity="0.4"/>
  <text x="412" y="198" fill="#fde68a" font-size="8.5" font-weight="500" text-anchor="middle">/brokers/dirs/{id}</text>
  <text x="412" y="214" fill="#fde68a" font-size="8.5" font-weight="500" text-anchor="middle">状态: OFFLINE</text>
  <text x="412" y="234" fill="#fde68a" font-size="8.5" font-weight="500" text-anchor="middle">/log_dir_event_notification</text>
  <text x="412" y="250" fill="#fbbf24" font-size="8.5" font-weight="600" text-anchor="middle">LOG_DIR_FAILURE 事件</text>

  <!-- Lane 1 horizontal flow arrow -->
  <line x1="378" y1="204" x2="312" y2="204" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow-amber)" opacity="0.6"/>

  <!-- ===== LANE 2: ZK ===== -->
  <rect x="160" y="280" width="1180" height="115" rx="8" fill="rgba(30,41,59,0.2)" stroke="#334155" stroke-width="1"/>

  <rect x="20" y="298" width="120" height="68" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="80" y="327" fill="#c4b5fd" font-size="13" font-weight="700" text-anchor="middle">ZooKeeper</text>
  <text x="80" y="347" fill="#94a3b8" font-size="10" text-anchor="middle">状态</text>

  <rect x="348" y="296" width="220" height="82" rx="8" fill="#0f172a"/>
  <rect x="348" y="296" width="220" height="82" rx="8" fill="rgba(120,53,15,0.25)" stroke="#fbbf24" stroke-width="1.8"/>
  <text x="458" y="318" fill="#fbbf24" font-size="10" font-weight="700" text-anchor="middle">🔔 ZK 目录变更</text>
  <line x1="366" y1="326" x2="550" y2="326" stroke="#fbbf24" stroke-width="0.5" opacity="0.4"/>
  <text x="458" y="344" fill="#fde68a" font-size="9" font-weight="500" text-anchor="middle">/brokers/dirs/{id} = OFFLINE</text>
  <text x="458" y="360" fill="#fde68a" font-size="9" font-weight="500" text-anchor="middle">log_dir_event_notification 变更</text>
  <text x="458" y="376" fill="#fbbf24" font-size="9" font-weight="700" text-anchor="middle">→ ZK Watcher 触发 Controller</text>

  <!-- Lane-crossing arrow: Broker → ZK (with label) -->
  <line x1="458" y1="252" x2="458" y2="296" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow-amber)" opacity="0.5" stroke-dasharray="4,3"/>
  <text x="472" y="278" fill="#fbbf24" font-size="7" text-anchor="start">异步写入 ZK</text>

  <!-- ===== LANE 3: CONTROLLER ===== -->
  <rect x="160" y="405" width="1180" height="165" rx="8" fill="rgba(30,41,59,0.3)" stroke="#334155" stroke-width="1"/>

  <rect x="20" y="448" width="120" height="68" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="80" y="476" fill="#6ee7b7" font-size="13" font-weight="700" text-anchor="middle">Controller</text>
  <text x="80" y="496" fill="#94a3b8" font-size="10" text-anchor="middle">操作</text>

  <!-- T+~2s: 收到通知 -->
  <rect x="488" y="420" width="200" height="100" rx="8" fill="#0f172a"/>
  <rect x="488" y="420" width="200" height="100" rx="8" fill="rgba(59,130,246,0.2)" stroke="#60a5fa" stroke-width="2"/>
  <text x="588" y="442" fill="#93c5fd" font-size="10" font-weight="700" text-anchor="middle">📥 收到 ZK 通知</text>
  <line x1="506" y1="450" x2="670" y2="450" stroke="#60a5fa" stroke-width="0.5" opacity="0.4"/>
  <text x="588" y="466" fill="#bfdbfe" font-size="8.5" font-weight="500" text-anchor="middle">读取故障目录信息</text>
  <text x="588" y="484" fill="#bfdbfe" font-size="8.5" font-weight="500" text-anchor="middle">识别受影响分区</text>
  <text x="588" y="506" fill="#fbbf24" font-size="9" font-weight="700" text-anchor="middle">标记 → DISABLED</text>

  <!-- T+~30s: 触发副本迁移 -->
  <rect x="710" y="420" width="200" height="120" rx="8" fill="#0f172a"/>
  <rect x="710" y="420" width="200" height="120" rx="8" fill="rgba(8,51,68,0.35)" stroke="#22d3ee" stroke-width="2"/>
  <text x="810" y="442" fill="#22d3ee" font-size="10" font-weight="700" text-anchor="middle">🔄 触发副本迁移</text>
  <line x1="728" y1="450" x2="892" y2="450" stroke="#22d3ee" stroke-width="0.5" opacity="0.4"/>
  <text x="810" y="466" fill="#a5f3fc" font-size="8.5" font-weight="500" text-anchor="middle">创建重分配计划</text>
  <text x="810" y="484" fill="#a5f3fc" font-size="8.5" font-weight="500" text-anchor="middle">仅故障盘分区</text>
  <text x="810" y="502" fill="#a5f3fc" font-size="8.5" font-weight="500" text-anchor="middle">写入</text>
  <text x="810" y="518" fill="#67e8f9" font-size="8" font-weight="500" text-anchor="middle">/admin/reassign_partitions</text>
  <text x="810" y="536" fill="#22d3ee" font-size="8.5" font-weight="600" text-anchor="middle">执行迁移 (带限流)</text>

  <!-- T+~5min: 迁移完成 -->
  <rect x="948" y="423" width="200" height="96" rx="8" fill="#0f172a"/>
  <rect x="948" y="423" width="200" height="96" rx="8" fill="rgba(6,78,59,0.35)" stroke="#34d399" stroke-width="2" filter="url(#glow-green)"/>
  <text x="1048" y="445" fill="#34d399" font-size="10" font-weight="700" text-anchor="middle">✅ 迁移完成</text>
  <line x1="966" y1="453" x2="1130" y2="453" stroke="#34d399" stroke-width="0.5" opacity="0.4"/>
  <text x="1048" y="472" fill="#6ee7b7" font-size="9" font-weight="500" text-anchor="middle">所有受影响分区</text>
  <text x="1048" y="490" fill="#6ee7b7" font-size="9" font-weight="500" text-anchor="middle">已有健康副本</text>
  <text x="1048" y="512" fill="#34d399" font-size="9" font-weight="700" text-anchor="middle">ISR 扩展 → 集群恢复</text>

  <!-- T+N: Admin -->
  <rect x="1188" y="420" width="200" height="110" rx="8" fill="#0f172a"/>
  <rect x="1188" y="420" width="200" height="110" rx="8" fill="rgba(136,19,55,0.3)" stroke="#fb7185" stroke-width="1.8"/>
  <text x="1288" y="442" fill="#fb7185" font-size="10" font-weight="700" text-anchor="middle">👤 管理员操作</text>
  <line x1="1206" y1="450" x2="1370" y2="450" stroke="#fb7185" stroke-width="0.5" opacity="0.4"/>
  <text x="1288" y="470" fill="#fca5a5" font-size="9" font-weight="500" text-anchor="middle">通知管理员 → 安排换盘</text>
  <text x="1288" y="490" fill="#fca5a5" font-size="9" font-weight="500" text-anchor="middle">换盘后</text>
  <text x="1288" y="506" fill="#fca5a5" font-size="9" font-weight="500" text-anchor="middle">DirectoryHealthManager</text>
  <text x="1288" y="522" fill="#fca5a5" font-size="9" font-weight="500" text-anchor="middle">检测磁盘恢复</text>
  <text x="1288" y="540" fill="#34d399" font-size="9" font-weight="700" text-anchor="middle">DISABLED → ONLINE</text>

  <!-- Lane-crossing arrows with labels -->
  <line x1="458" y1="378" x2="588" y2="420" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrow-slate)" opacity="0.5" stroke-dasharray="4,3"/>
  <text x="530" y="392" fill="#60a5fa" font-size="7" text-anchor="start">Watch 触发</text>

  <!-- Horizontal flow arrows in Controller lane -->
  <line x1="688" y1="470" x2="710" y2="470" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)" opacity="0.6"/>
  <line x1="910" y1="470" x2="948" y2="470" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-green)" opacity="0.6"/>
  <line x1="1148" y1="470" x2="1188" y2="470" stroke="#fb7185" stroke-width="1.5" marker-end="url(#arrow-rose)" opacity="0.5" stroke-dasharray="6,4"/>

  <!-- STATUS BAR -->
  <rect x="178" y="582" width="1150" height="28" rx="4" fill="rgba(30,41,59,0.4)" stroke="#334155" stroke-width="0.8"/>

  <rect x="190" y="588" width="110" height="16" rx="3" fill="rgba(136,19,55,0.5)" stroke="#fb7185" stroke-width="1"/>
  <text x="245" y="600" fill="#fb7185" font-size="8" font-weight="600" text-anchor="middle">ONLINE</text>
  <polygon points="308,596 318,591 318,601" fill="#64748b"/>
  <rect x="326" y="588" width="110" height="16" rx="3" fill="rgba(136,19,55,0.5)" stroke="#fb7185" stroke-width="1"/>
  <text x="381" y="600" fill="#fb7185" font-size="8" font-weight="600" text-anchor="middle">OFFLINE</text>
  <polygon points="444,596 454,591 454,601" fill="#64748b"/>
  <rect x="462" y="588" width="110" height="16" rx="3" fill="rgba(59,130,246,0.4)" stroke="#60a5fa" stroke-width="1"/>
  <text x="517" y="600" fill="#93c5fd" font-size="8" font-weight="600" text-anchor="middle">DISABLED</text>
  <polygon points="580,596 590,591 590,601" fill="#64748b"/>
  <rect x="598" y="588" width="110" height="16" rx="3" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1"/>
  <text x="653" y="600" fill="#22d3ee" font-size="8" font-weight="600" text-anchor="middle">MIGRATING</text>
  <polygon points="716,596 726,591 726,601" fill="#34d399"/>
  <rect x="734" y="588" width="140" height="16" rx="3" fill="rgba(6,78,59,0.5)" stroke="#34d399" stroke-width="1.5"/>
  <text x="804" y="600" fill="#34d399" font-size="8" font-weight="700" text-anchor="middle">HEALTHY (恢复)</text>
  <polygon points="882,596 892,591 892,601" fill="#64748b"/>
  <text x="930" y="600" fill="#64748b" font-size="8" font-weight="400">→</text>
  <rect x="950" y="588" width="140" height="16" rx="3" fill="rgba(136,19,55,0.3)" stroke="#fb7185" stroke-width="0.8" stroke-dasharray="3,3"/>
  <text x="1020" y="600" fill="#fb7185" font-size="7.5" font-weight="500" text-anchor="middle">等待换盘 ONLINE</text>
  <text x="1100" y="600" fill="#94a3b8" font-size="7.5" font-weight="400">🔧 磁盘状态流转: ONLINE → OFFLINE → DISABLED → MIGRATING → HEALTHY → (换盘) ONLINE</text>

  <!-- LEGEND -->
  <rect x="1060" y="8" width="260" height="72" rx="6" fill="rgba(30,41,59,0.7)" stroke="#334155" stroke-width="1"/>
  <text x="1075" y="24" fill="#94a3b8" font-size="8" font-weight="600">图例</text>
  <circle cx="1081" cy="36" r="4" fill="rgba(136,19,55,0.6)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="1092" y="39" fill="#fca5a5" font-size="8" font-weight="500">故障/告警</text>
  <circle cx="1171" cy="36" r="4" fill="rgba(59,130,246,0.4)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="1182" y="39" fill="#93c5fd" font-size="8" font-weight="500">检测/响应</text>
  <circle cx="1081" cy="54" r="4" fill="rgba(8,51,68,0.5)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="1092" y="57" fill="#67e8f9" font-size="8" font-weight="500">处理中</text>
  <circle cx="1171" cy="54" r="4" fill="rgba(6,78,59,0.5)" stroke="#34d399" stroke-width="1.5"/>
  <text x="1182" y="57" fill="#6ee7b7" font-size="8" font-weight="500">恢复/完成</text>
  <circle cx="1081" cy="70" r="4" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="1092" y="73" fill="#fde68a" font-size="8" font-weight="500">ZK 交互</text>
  <circle cx="1171" cy="70" r="3" fill="none" stroke="#64748b" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="1182" y="73" fill="#94a3b8" font-size="8" font-weight="400">异步/等待</text>
</svg>