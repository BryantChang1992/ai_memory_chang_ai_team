<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 920">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
    <marker id="arrow-rose" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb7185"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-rose-dash" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb7185"/>
    </marker>
    <filter id="rose-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;family=Noto+Sans+SC:wght@400;500;700&amp;display=swap');
    text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Title -->
  <text x="30" y="35" fill="#e2e8f0" font-size="16" font-weight="700">ZK 模式现有磁盘故障处理流程</text>
  <line x1="30" y1="42" x2="560" y2="42" stroke="#334155" stroke-width="1"/>

  <!-- ===== ARROWS (back layer) ===== -->

  <!-- Arrow 1→2: cyan -->
  <line x1="350" y1="120" x2="350" y2="155" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <!-- Arrow 2→3: cyan -->
  <line x1="350" y1="215" x2="350" y2="255" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <!-- Arrow 3→4: cyan -->
  <line x1="350" y1="315" x2="350" y2="355" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <!-- Arrow 4→5: cyan -->
  <line x1="350" y1="415" x2="350" y2="455" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <!-- Arrow 5→6: amber -->
  <line x1="350" y1="515" x2="350" y2="555" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <!-- Arrow 6→7: rose -->
  <line x1="350" y1="615" x2="350" y2="655" stroke="#fb7185" stroke-width="1.5" marker-end="url(#arrow-rose)"/>
  <!-- Arrow 7→8: rose to emerald -->
  <line x1="350" y1="780" x2="350" y2="820" stroke="#fb7185" stroke-width="1.5" marker-end="url(#arrow-rose)"/>

  <!-- Dashed connector: step 7 right edge → annotation panel — rounded corners -->
  <path d="M 560 720 C 580 720, 590 720, 590 700 C 590 230, 590 205, 590 200"
        fill="none" stroke="#fb7185" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow-rose-dash)"/>
  <text x="610" y="470" fill="#fb7185" font-size="8" text-anchor="start">核心问题分析</text>

  <!-- ===== MASK LAYER ===== -->

  <rect x="190" y="70" width="320" height="50" rx="25" fill="#0f172a"/>
  <rect x="180" y="160" width="340" height="55" rx="8" fill="#0f172a"/>
  <rect x="160" y="260" width="380" height="55" rx="8" fill="#0f172a"/>
  <rect x="170" y="360" width="360" height="55" rx="8" fill="#0f172a"/>
  <rect x="170" y="460" width="360" height="55" rx="8" fill="#0f172a"/>
  <rect x="190" y="560" width="320" height="55" rx="8" fill="#0f172a"/>
  <rect x="140" y="660" width="420" height="120" rx="10" fill="#0f172a"/>
  <rect x="170" y="825" width="360" height="55" rx="8" fill="#0f172a"/>
  <rect x="600" y="150" width="330" height="350" rx="10" fill="#0f172a"/>

  <!-- ===== COMPONENT BOXES ===== -->

  <!-- Step 1: Start node -->
  <rect x="190" y="70" width="320" height="50" rx="25" fill="rgba(59,130,246,0.25)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="350" y="100" fill="white" font-size="13" font-weight="600" text-anchor="middle">① 磁盘 I/O 错误</text>

  <!-- Step 2 -->
  <rect x="180" y="160" width="340" height="55" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="350" y="182" fill="white" font-size="12" font-weight="600" text-anchor="middle">② ReplicaManager 捕获 IOException</text>
  <text x="350" y="200" fill="#94a3b8" font-size="9" text-anchor="middle">日志目录写入失败 → 触发故障检测</text>

  <!-- Step 3 -->
  <rect x="160" y="260" width="380" height="55" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="350" y="282" fill="white" font-size="11" font-weight="600" text-anchor="middle" font-family="'JetBrains Mono', monospace">③ LogDirFailureChannel</text>
  <text x="350" y="300" fill="#22d3ee" font-size="10" text-anchor="middle" font-family="'JetBrains Mono', monospace">.maybeAddOfflineLogDir()</text>

  <!-- Step 4 -->
  <rect x="170" y="360" width="360" height="55" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="350" y="384" fill="white" font-size="12" font-weight="600" text-anchor="middle">④ KafkaServer LogDirFailure</text>
  <text x="350" y="402" fill="#94a3b8" font-size="9" text-anchor="middle">处理线程收到通知</text>

  <!-- Step 5 -->
  <rect x="170" y="460" width="360" height="55" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="350" y="482" fill="white" font-size="12" font-weight="600" text-anchor="middle">⑤ 等待 log.dir.failure.timeout.ms 超时</text>
  <text x="350" y="500" fill="#94a3b8" font-size="9" text-anchor="middle">默认 30000ms · 无更细粒度操作</text>

  <!-- Step 6 -->
  <rect x="190" y="560" width="320" height="55" rx="8" fill="rgba(120,53,15,0.35)" stroke="#fbbf24" stroke-width="2"/>
  <text x="350" y="584" fill="#fbbf24" font-size="12" font-weight="700" text-anchor="middle">⑥ Broker 主动 SHUTDOWN ⚠️</text>
  <text x="350" y="602" fill="#fbbf24" font-size="9" text-anchor="middle" opacity="0.7">整机下线，所有分区不可用</text>

  <!-- Step 7 -->
  <rect x="140" y="660" width="420" height="120" rx="10" fill="rgba(136,19,55,0.35)" stroke="#fb7185" stroke-width="2.5" filter="url(#rose-glow)"/>
  <rect x="148" y="668" width="404" height="104" rx="6" fill="none" stroke="#fb7185" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.6"/>
  <text x="350" y="690" fill="#fb7185" font-size="13" font-weight="700" text-anchor="middle">⚠️ ⑦ 核心问题</text>
  <text x="350" y="713" fill="#fda4af" font-size="11" font-weight="600" text-anchor="middle">Controller 直到整机 shutdown 才知道故障</text>
  <text x="350" y="735" fill="#fecdd3" font-size="10" text-anchor="middle">在此之前故障盘分区不可读写</text>
  <text x="350" y="755" fill="#fecdd3" font-size="10" text-anchor="middle">但 Controller 始终无感知</text>

  <!-- Step 8 -->
  <rect x="170" y="825" width="360" height="55" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="350" y="849" fill="white" font-size="12" font-weight="600" text-anchor="middle">⑧ ZK 会话超时 → Controller 触发 Leader 选举</text>
  <text x="350" y="867" fill="#94a3b8" font-size="9" text-anchor="middle">被动恢复 · 故障恢复窗口长</text>

  <!-- ===== ANNOTATION PANEL ===== -->
  <rect x="600" y="150" width="330" height="350" rx="10" fill="rgba(136,19,55,0.15)" stroke="#fb7185" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="600" y="150" width="330" height="36" rx="10" fill="rgba(136,19,55,0.3)"/>
  <rect x="600" y="176" width="330" height="10" fill="rgba(136,19,55,0.3)"/>
  <text x="765" y="173" fill="#fb7185" font-size="13" font-weight="700" text-anchor="middle">⚠️ 问题分析</text>
  <line x1="615" y1="198" x2="915" y2="198" stroke="#fb7185" stroke-width="0.5" opacity="0.4"/>

  <!-- Problem 1 -->
  <rect x="615" y="212" width="300" height="82" rx="6" fill="rgba(251,191,36,0.08)" stroke="#fbbf24" stroke-width="0.8" stroke-dasharray="4,3"/>
  <circle cx="632" cy="232" r="10" fill="rgba(251,191,36,0.3)" stroke="#fbbf24" stroke-width="1"/>
  <text x="632" y="236" fill="#fbbf24" font-size="10" font-weight="700" text-anchor="middle">1</text>
  <text x="650" y="236" fill="#fbbf24" font-size="11" font-weight="600">粒度过粗（整机级别）</text>
  <text x="625" y="256" fill="#e2e8f0" font-size="9">只能整机 shutdown，无法针对</text>
  <text x="625" y="272" fill="#e2e8f0" font-size="9">单个故障磁盘进行隔离处理</text>
  <text x="625" y="288" fill="#94a3b8" font-size="8">JBOD 场景单盘故障 = 整机不可用</text>

  <!-- Problem 2 -->
  <rect x="615" y="305" width="300" height="82" rx="6" fill="rgba(251,146,60,0.08)" stroke="#fb923c" stroke-width="0.8" stroke-dasharray="4,3"/>
  <circle cx="632" cy="325" r="10" fill="rgba(251,146,60,0.3)" stroke="#fb923c" stroke-width="1"/>
  <text x="632" y="329" fill="#fb923c" font-size="10" font-weight="700" text-anchor="middle">2</text>
  <text x="650" y="329" fill="#fb923c" font-size="11" font-weight="600">感知延迟（依赖心跳超时）</text>
  <text x="625" y="349" fill="#e2e8f0" font-size="9">Controller 通过 ZK 会话超时间接</text>
  <text x="625" y="365" fill="#e2e8f0" font-size="9">感知故障，非实时主动检测</text>
  <text x="625" y="381" fill="#94a3b8" font-size="8">延迟可达 zookeeper.session.timeout.ms</text>

  <!-- Problem 3 -->
  <rect x="615" y="398" width="300" height="82" rx="6" fill="rgba(251,113,133,0.08)" stroke="#fb7185" stroke-width="0.8" stroke-dasharray="4,3"/>
  <circle cx="632" cy="418" r="10" fill="rgba(251,113,133,0.3)" stroke="#fb7185" stroke-width="1"/>
  <text x="632" y="422" fill="#fb7185" font-size="10" font-weight="700" text-anchor="middle">3</text>
  <text x="650" y="422" fill="#fb7185" font-size="11" font-weight="600">恢复需手动操作</text>
  <text x="625" y="442" fill="#e2e8f0" font-size="9">需人工介入替换磁盘、恢复数据</text>
  <text x="625" y="458" fill="#e2e8f0" font-size="9">重启 Broker，无自动化恢复流程</text>
  <text x="625" y="474" fill="#94a3b8" font-size="8">MTTR 受运维响应时间制约</text>

  <!-- ===== LEGEND ===== -->
  <rect x="600" y="830" width="330" height="55" rx="6" fill="rgba(30,41,59,0.4)" stroke="#334155" stroke-width="1"/>
  <text x="620" y="850" fill="#94a3b8" font-size="8" font-weight="600">图例</text>
  <circle cx="660" cy="866" r="4" fill="#22d3ee"/>
  <text x="672" y="870" fill="#94a3b8" font-size="8">正常流程</text>
  <circle cx="740" cy="866" r="4" fill="#fbbf24"/>
  <text x="752" y="870" fill="#94a3b8" font-size="8">故障触发</text>
  <circle cx="820" cy="866" r="4" fill="#fb7185"/>
  <text x="832" y="870" fill="#94a3b8" font-size="8">核心问题</text>
  <circle cx="900" cy="866" r="4" fill="#34d399"/>
  <text x="912" y="870" fill="#94a3b8" font-size="8">恢复</text>
</svg>