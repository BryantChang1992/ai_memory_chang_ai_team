  <!-- ===== Data source note ===== -->
  <text x="480" y="610" fill="#64748b" font-size="8" text-anchor="middle">数据来源: SQLite (read-only) · 自动刷新: 5s · Chart.js 渲染 · 纯静态 HTML + GitHub Pages</text>
