<!-- mermaid support for UML diagrams -->
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", async function() {
    /* Convert Rouge-rendered mermaid code blocks to native mermaid format */
    var mermaidBlocks = document.querySelectorAll('code.language-mermaid');
    mermaidBlocks.forEach(function(block) {
      var pre = block.parentElement;
      pre.classList.add('mermaid');
      pre.removeAttribute('data-language');
      block.removeAttribute('class');
      block.innerHTML = block.textContent;
    });

    mermaid.initialize({
      startOnLoad: false,
      theme: 'default',
      securityLevel: 'loose'
    });

    /* Render each mermaid block individually with error isolation */
    var nodes = document.querySelectorAll('pre.mermaid');
    for (var i = 0; i < nodes.length; i++) {
      try {
        await mermaid.run({ nodes: [nodes[i]] });
      } catch (e) {
        console.error('Mermaid block ' + i + ' render failed:', e);
        nodes[i].textContent = '[Mermaid diagram ' + i + ' render error]';
      }
    }
  });
</script>
