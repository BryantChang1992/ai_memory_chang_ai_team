<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 800">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-cyan-rev" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee" opacity="0.4"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
    <marker id="arrow-amber-rev" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24" opacity="0.4"/>
    </marker>
    <marker id="arrow-slate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
    text {
      font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }
  </style>

  <!-- 1. Background -->
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- 2. Region boundary for ZK hub -->
  <rect x="340" y="255" width="390" height="220" rx="16" fill="none" stroke="#a78bfa" stroke-width="1" stroke-dasharray="10,5" stroke-opacity="0.35"/>

  <!-- 3. Connection lines -->

  <!-- Connection 1: ZK → Broker 1 -->
  <line x1="535" y1="270" x2="535" y2="95" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)" stroke-opacity="0.7"/>

  <!-- Connection 2: ZK → Broker 2 — symmetric vertical style matching Broker 1 -->
  <line x1="160" y1="430" x2="160" y2="455" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)" stroke-opacity="0.7"/>
  <!-- Return direction arrow (bidirectional, same x axis) -->
  <line x1="160" y1="460" x2="160" y2="465" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.35"/>

  <!-- Connection 3: ZK → Controller (bidirectional on same y) -->
  <line x1="710" y1="370" x2="735" y2="370" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow-amber)" stroke-opacity="0.8"/>
  <line x1="735" y1="375" x2="710" y2="375" stroke="#fbbf24" stroke-width="1" marker-end="url(#arrow-amber-rev)" stroke-opacity="0.4"/>

  <!-- Connection labels -->
  <text x="548" y="185" fill="#64748b" font-size="8" text-anchor="start">注册 / 心跳</text>
  <text x="148" y="475" fill="#64748b" font-size="8" text-anchor="end">注册 / 心跳</text>
  <text x="728" y="362" fill="#64748b" font-size="8" text-anchor="start">监听 &amp; 事件通知</text>

  <!-- 4. Opaque masking rects -->

  <!-- ZK Cluster mask -->
  <rect x="360" y="270" width="350" height="190" rx="10" fill="#0f172a"/>
  <!-- Broker 1 mask -->
  <rect x="360" y="40" width="350" height="50" rx="6" fill="#0f172a"/>
  <!-- DHM 1 mask -->
  <rect x="360" y="100" width="350" height="115" rx="6" fill="#0f172a"/>
  <!-- Broker 2 mask -->
  <rect x="30" y="375" width="260" height="50" rx="6" fill="#0f172a"/>
  <!-- DHM 2 mask -->
  <rect x="30" y="435" width="260" height="85" rx="6" fill="#0f172a"/>
  <!-- Controller mask -->
  <rect x="740" y="310" width="285" height="195" rx="8" fill="#0f172a"/>

  <!-- 5. Component boxes -->

  <!-- ZK Cluster -->
  <rect x="360" y="270" width="350" height="190" rx="10" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="2" filter="url(#glow)"/>

  <!-- Broker 1 -->
  <rect x="360" y="40" width="350" height="50" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>

  <!-- DHM 1 -->
  <rect x="360" y="100" width="350" height="115" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>

  <!-- Broker 2 -->
  <rect x="30" y="375" width="260" height="50" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>

  <!-- DHM 2 -->
  <rect x="30" y="435" width="260" height="85" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>

  <!-- Controller -->
  <rect x="740" y="310" width="285" height="195" rx="8" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="2"/>

  <!-- 6. Component internal dividers -->
  <line x1="375" y1="322" x2="695" y2="322" stroke="#a78bfa" stroke-width="0.5" stroke-opacity="0.4"/>
  <line x1="375" y1="132" x2="695" y2="132" stroke="#34d399" stroke-width="0.5" stroke-opacity="0.4"/>
  <line x1="45" y1="468" x2="275" y2="468" stroke="#34d399" stroke-width="0.5" stroke-opacity="0.4"/>
  <line x1="755" y1="360" x2="1010" y2="360" stroke="#fbbf24" stroke-width="0.5" stroke-opacity="0.4"/>

  <!-- 7. Text labels -->

  <!-- Title -->
  <text x="30" y="28" fill="#e2e8f0" font-size="15" font-weight="700">ZK 版 Kafka JBOD 磁盘故障处理 — 架构总览</text>

  <!-- ZK Cluster Text -->
  <text x="535" y="295" fill="#e2e8f0" font-size="13" font-weight="600" text-anchor="middle">ZooKeeper 集群</text>
  <text x="535" y="313" fill="#94a3b8" font-size="9" text-anchor="middle">中央协调枢纽</text>

  <text x="380" y="342" fill="#d1d5db" font-size="9" font-family="'JetBrains Mono','SF Mono','Cascadia Code',monospace">/brokers/ids/{id}</text>
  <text x="380" y="362" fill="#d1d5db" font-size="9" font-family="'JetBrains Mono','SF Mono','Cascadia Code',monospace">/brokers/dirs/{id}</text>
  <text x="536" y="362" fill="#34d399" font-size="8">[新增]</text>

  <text x="380" y="382" fill="#d1d5db" font-size="9" font-family="'JetBrains Mono','SF Mono','Cascadia Code',monospace">/controller</text>
  <text x="380" y="402" fill="#d1d5db" font-size="9" font-family="'JetBrains Mono','SF Mono','Cascadia Code',monospace">/admin/reassign_partitions</text>

  <text x="380" y="422" fill="#d1d5db" font-size="9" font-family="'JetBrains Mono','SF Mono','Cascadia Code',monospace">/log_dir_event_notification</text>
  <text x="556" y="422" fill="#60a5fa" font-size="8">[增强]</text>

  <text x="535" y="448" fill="#64748b" font-size="8" text-anchor="middle">关键路径</text>

  <!-- Broker 1 Text -->
  <text x="535" y="62" fill="#e2e8f0" font-size="12" font-weight="600" text-anchor="middle">Broker 1</text>
  <text x="535" y="79" fill="#94a3b8" font-size="9" text-anchor="middle">Kafka 节点</text>

  <!-- DHM 1 Text -->
  <text x="535" y="121" fill="#e2e8f0" font-size="11" font-weight="600" text-anchor="middle">DirectoryHealthManager</text>
  <text x="615" y="121" fill="#34d399" font-size="8">[新增]</text>

  <text x="380" y="153" fill="#d1d5db" font-size="10" font-family="'JetBrains Mono','SF Mono','Cascadia Code',monospace">/data1</text>
  <text x="490" y="153" fill="#34d399" font-size="10">✅ ONLINE</text>
  <text x="380" y="174" fill="#d1d5db" font-size="10" font-family="'JetBrains Mono','SF Mono','Cascadia Code',monospace">/data2</text>
  <text x="490" y="174" fill="#fb7185" font-size="10">❌ OFFLINE</text>
  <text x="380" y="195" fill="#d1d5db" font-size="10" font-family="'JetBrains Mono','SF Mono','Cascadia Code',monospace">/data3</text>
  <text x="490" y="195" fill="#34d399" font-size="10">✅ ONLINE</text>

  <!-- OFFLINE row highlight -->
  <rect x="365" y="163" width="340" height="18" rx="3" fill="#fb7185" fill-opacity="0.08"/>

  <!-- Broker 2 Text -->
  <text x="160" y="397" fill="#e2e8f0" font-size="12" font-weight="600" text-anchor="middle">Broker 2</text>
  <text x="160" y="414" fill="#94a3b8" font-size="9" text-anchor="middle">Kafka 节点</text>

  <!-- DHM 2 Text -->
  <text x="160" y="458" fill="#e2e8f0" font-size="11" font-weight="600" text-anchor="middle">DirectoryHealthManager</text>
  <text x="240" y="458" fill="#34d399" font-size="8">[新增]</text>

  <text x="50" y="490" fill="#d1d5db" font-size="10" font-family="'JetBrains Mono','SF Mono','Cascadia Code',monospace">/data1</text>
  <text x="160" y="490" fill="#34d399" font-size="10">✅ ONLINE</text>
  <text x="50" y="510" fill="#d1d5db" font-size="10" font-family="'JetBrains Mono','SF Mono','Cascadia Code',monospace">/data2</text>
  <text x="160" y="510" fill="#34d399" font-size="10">✅ ONLINE</text>

  <!-- Controller Text -->
  <text x="882" y="335" fill="#e2e8f0" font-size="12" font-weight="600" text-anchor="middle">Controller</text>
  <text x="882" y="352" fill="#94a3b8" font-size="9" text-anchor="middle">Kafka 控制器</text>

  <text x="760" y="378" fill="#94a3b8" font-size="9">
    <tspan fill="#fbbf24">监听:</tspan>
    <tspan fill="#d1d5db" font-family="'JetBrains Mono','SF Mono','Cascadia Code',monospace"> /brokers/dirs/*</tspan>
  </text>

  <text x="760" y="402" fill="#e2e8f0" font-size="9" font-weight="600">▸ 磁盘故障响应:</text>

  <text x="770" y="425" fill="#d1d5db" font-size="9">
    <tspan fill="#fb923c">①</tspan> 标记分区为 DISABLED
  </text>
  <text x="770" y="448" fill="#d1d5db" font-size="9">
    <tspan fill="#fb923c">②</tspan> 迁移副本到健康磁盘
  </text>
  <text x="770" y="471" fill="#d1d5db" font-size="9">
    <tspan fill="#fb923c">③</tspan> 通知管理员
  </text>

  <!-- 8. Legend -->
  <rect x="730" y="610" width="300" height="95" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="880" y="630" fill="#94a3b8" font-size="9" font-weight="600" text-anchor="middle">图例</text>

  <rect x="745" y="642" width="14" height="14" rx="3" fill="rgba(76,29,149,0.5)" stroke="#a78bfa" stroke-width="1"/>
  <text x="766" y="654" fill="#cbd5e1" font-size="9">ZooKeeper</text>

  <rect x="745" y="662" width="14" height="14" rx="3" fill="rgba(8,51,68,0.5)" stroke="#22d3ee" stroke-width="1"/>
  <text x="766" y="674" fill="#cbd5e1" font-size="9">Kafka Broker</text>

  <rect x="870" y="642" width="14" height="14" rx="3" fill="rgba(6,78,59,0.5)" stroke="#34d399" stroke-width="1"/>
  <text x="891" y="654" fill="#cbd5e1" font-size="9">DirectoryHealthManager</text>

  <rect x="870" y="662" width="14" height="14" rx="3" fill="rgba(120,53,15,0.4)" stroke="#fbbf24" stroke-width="1"/>
  <text x="891" y="674" fill="#cbd5e1" font-size="9">Controller</text>
</svg>