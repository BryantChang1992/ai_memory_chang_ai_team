<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 1160">
  <defs>
    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>

    <!-- Arrowhead markers -->
    <marker id="arrow-neutral" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa"/>
    </marker>

    <!-- Glow filter for title -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Drop shadow for boxes -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
    text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    .title { font-size: 17px; font-weight: 700; fill: #f1f5f9; }
    .subtitle { font-size: 11px; font-weight: 400; fill: #94a3b8; }
    .step-num { font-size: 13px; font-weight: 700; fill: #0f172a; }
    .step-actor { font-size: 12px; font-weight: 600; }
    .step-text { font-size: 10px; font-weight: 400; fill: #cbd5e1; }
    .step-cmd { font-size: 9.5px; font-weight: 400; fill: #e2e8f0; }
    .step-note { font-size: 9px; font-weight: 400; fill: #94a3b8; }
    .step-time { font-size: 9px; font-weight: 500; fill: #fbbf24; }
    .arrow-label { font-size: 8px; font-weight: 500; fill: #64748b; }
    .legend-text { font-size: 10px; font-weight: 500; fill: #94a3b8; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Title -->
  <text x="480" y="42" class="title" text-anchor="middle" filter="url(#glow)">计划内磁盘维护完整流程 — Cordon → 换盘 → Uncordon</text>
  <text x="480" y="62" class="subtitle" text-anchor="middle">ZK-Kafka JBOD 磁盘维护 6 步流程 · 每步标注执行者与预计耗时</text>

  <!-- ============================================================ -->
  <!-- STEP 1: Cordon 磁盘 (Admin/Green) -->
  <!-- ============================================================ -->
  <g>
    <!-- Mask layer -->
    <rect x="130" y="80" width="700" height="105" rx="8" fill="#0f172a" filter="url(#shadow)"/>
    <!-- Visual box -->
    <rect x="130" y="80" width="700" height="105" rx="8" fill="rgba(6,78,59,0.35)" stroke="#34d399" stroke-width="1.5"/>
    <!-- Left accent bar -->
    <rect x="130" y="80" width="5" height="105" rx="2" fill="#34d399"/>
    <!-- Step number circle -->
    <circle cx="158" cy="113" r="13" fill="#34d399"/>
    <text x="158" y="117" class="step-num" text-anchor="middle">1</text>
    <!-- Actor badge -->
    <rect x="180" y="100" width="48" height="18" rx="4" fill="#34d399"/>
    <text x="204" y="113" class="step-num" text-anchor="middle" style="font-size:9.5px; fill:#0f172a;">Admin</text>
    <!-- Step title -->
    <text x="236" y="115" class="step-actor" fill="#34d399">Cordon 磁盘</text>
    <!-- Time estimate -->
    <text x="810" y="115" class="step-time" text-anchor="end">⏱ ~1 分钟</text>
    <!-- Command line 1 -->
    <text x="155" y="140" class="step-cmd" font-family="'JetBrains Mono', monospace">$ kafka-configs.sh --alter --add-config</text>
    <!-- Command line 2 -->
    <text x="155" y="157" class="step-cmd" font-family="'JetBrains Mono', monospace">    cordoned.log.dirs=/data2</text>
    <!-- Result -->
    <text x="155" y="174" class="step-note">→ Broker 写入 CORDONED 状态到 ZooKeeper</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="480" y1="185" x2="480" y2="228" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-neutral)"/>
  <text x="492" y="210" class="arrow-label">ZK Watch 通知 Controller</text>

  <!-- ============================================================ -->
  <!-- STEP 2: 停止分配 (Controller/Blue) -->
  <!-- ============================================================ -->
  <g>
    <rect x="130" y="235" width="700" height="105" rx="8" fill="#0f172a" filter="url(#shadow)"/>
    <rect x="130" y="235" width="700" height="105" rx="8" fill="rgba(59,130,246,0.22)" stroke="#60a5fa" stroke-width="1.5"/>
    <rect x="130" y="235" width="5" height="105" rx="2" fill="#60a5fa"/>
    <circle cx="158" cy="268" r="13" fill="#60a5fa"/>
    <text x="158" y="272" class="step-num" text-anchor="middle">2</text>
    <rect x="180" y="255" width="72" height="18" rx="4" fill="#60a5fa"/>
    <text x="216" y="268" class="step-num" text-anchor="middle" style="font-size:9.5px; fill:#0f172a;">Controller</text>
    <text x="260" y="270" class="step-actor" fill="#60a5fa">停止分配 &amp; 迁移分区</text>
    <text x="810" y="270" class="step-time" text-anchor="end">⏱ ~10-30 分钟</text>
    <text x="155" y="295" class="step-text">停止分配新分区副本到 /data2</text>
    <text x="155" y="313" class="step-text">迁移 /data2 上现有分区副本到健康目录 (带限流)</text>
    <text x="155" y="331" class="step-note">→ Controller 发起 LeaderAndIsr 请求，触发副本迁移</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="480" y1="340" x2="480" y2="383" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-neutral)"/>
  <text x="492" y="365" class="arrow-label">迁移完成，等待 Admin 验证</text>

  <!-- ============================================================ -->
  <!-- STEP 3: 验证迁移 (Admin/Green) -->
  <!-- ============================================================ -->
  <g>
    <rect x="130" y="390" width="700" height="105" rx="8" fill="#0f172a" filter="url(#shadow)"/>
    <rect x="130" y="390" width="700" height="105" rx="8" fill="rgba(6,78,59,0.35)" stroke="#34d399" stroke-width="1.5"/>
    <rect x="130" y="390" width="5" height="105" rx="2" fill="#34d399"/>
    <circle cx="158" cy="423" r="13" fill="#34d399"/>
    <text x="158" y="427" class="step-num" text-anchor="middle">3</text>
    <rect x="180" y="410" width="48" height="18" rx="4" fill="#34d399"/>
    <text x="204" y="423" class="step-num" text-anchor="middle" style="font-size:9.5px; fill:#0f172a;">Admin</text>
    <text x="236" y="425" class="step-actor" fill="#34d399">等待迁移完成 &amp; 验证</text>
    <text x="810" y="425" class="step-time" text-anchor="end">⏱ ~5 分钟</text>
    <text x="155" y="450" class="step-text">等待副本迁移完成 → 检查副本分布状态</text>
    <text x="155" y="468" class="step-text">验证 /data2 目录下无残留分区副本</text>
    <text x="155" y="486" class="step-note">→ ✅ 确认磁盘安全可替换（零 IO 流量）</text>
  </g>

  <!-- Arrow 3→4 -->
  <line x1="480" y1="495" x2="480" y2="538" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-neutral)"/>
  <text x="492" y="520" class="arrow-label">磁盘已隔离，开始物理操作</text>

  <!-- ============================================================ -->
  <!-- STEP 4: 物理换盘 (Admin/Green) -->
  <!-- ============================================================ -->
  <g>
    <rect x="130" y="545" width="700" height="105" rx="8" fill="#0f172a" filter="url(#shadow)"/>
    <rect x="130" y="545" width="700" height="105" rx="8" fill="rgba(6,78,59,0.35)" stroke="#34d399" stroke-width="1.5"/>
    <rect x="130" y="545" width="5" height="105" rx="2" fill="#34d399"/>
    <circle cx="158" cy="578" r="13" fill="#34d399"/>
    <text x="158" y="582" class="step-num" text-anchor="middle">4</text>
    <rect x="180" y="565" width="48" height="18" rx="4" fill="#34d399"/>
    <text x="204" y="578" class="step-num" text-anchor="middle" style="font-size:9.5px; fill:#0f172a;">Admin</text>
    <text x="236" y="580" class="step-actor" fill="#34d399">物理更换磁盘 &amp; 挂载</text>
    <text x="810" y="580" class="step-time" text-anchor="end">⏱ ~15-30 分钟</text>
    <text x="155" y="605" class="step-text">物理拔出故障/旧磁盘 → 插入新磁盘</text>
    <text x="155" y="623" class="step-text">挂载新磁盘到 /data2 → 验证挂载点可读写</text>
    <text x="155" y="641" class="step-note">→ 💾 新磁盘就绪，等待 Uncordon 恢复上线</text>
  </g>

  <!-- Arrow 4→5 -->
  <line x1="480" y1="650" x2="480" y2="693" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-neutral)"/>
  <text x="492" y="675" class="arrow-label">新磁盘就绪，执行 Uncordon</text>

  <!-- ============================================================ -->
  <!-- STEP 5: Uncordon (Admin/Green) -->
  <!-- ============================================================ -->
  <g>
    <rect x="130" y="700" width="700" height="105" rx="8" fill="#0f172a" filter="url(#shadow)"/>
    <rect x="130" y="700" width="700" height="105" rx="8" fill="rgba(6,78,59,0.35)" stroke="#34d399" stroke-width="1.5"/>
    <rect x="130" y="700" width="5" height="105" rx="2" fill="#34d399"/>
    <circle cx="158" cy="733" r="13" fill="#34d399"/>
    <text x="158" y="737" class="step-num" text-anchor="middle">5</text>
    <rect x="180" y="720" width="48" height="18" rx="4" fill="#34d399"/>
    <text x="204" y="733" class="step-num" text-anchor="middle" style="font-size:9.5px; fill:#0f172a;">Admin</text>
    <text x="236" y="735" class="step-actor" fill="#34d399">Uncordon 磁盘</text>
    <text x="810" y="735" class="step-time" text-anchor="end">⏱ ~1 分钟</text>
    <text x="155" y="760" class="step-cmd" font-family="'JetBrains Mono', monospace">$ kafka-configs.sh --alter --delete-config</text>
    <text x="155" y="777" class="step-cmd" font-family="'JetBrains Mono', monospace">    cordoned.log.dirs</text>
    <text x="155" y="794" class="step-note">→ Broker 写入 ONLINE 状态到 ZooKeeper</text>
  </g>

  <!-- Arrow 5→6 -->
  <line x1="480" y1="805" x2="480" y2="848" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-neutral)"/>
  <text x="492" y="830" class="arrow-label">ZK Watch 通知 Controller</text>

  <!-- ============================================================ -->
  <!-- STEP 6: 副本均衡 (Controller/Blue) -->
  <!-- ============================================================ -->
  <g>
    <rect x="130" y="855" width="700" height="105" rx="8" fill="#0f172a" filter="url(#shadow)"/>
    <rect x="130" y="855" width="700" height="105" rx="8" fill="rgba(59,130,246,0.22)" stroke="#60a5fa" stroke-width="1.5"/>
    <rect x="130" y="855" width="5" height="105" rx="2" fill="#60a5fa"/>
    <circle cx="158" cy="888" r="13" fill="#60a5fa"/>
    <text x="158" y="892" class="step-num" text-anchor="middle">6</text>
    <rect x="180" y="875" width="72" height="18" rx="4" fill="#60a5fa"/>
    <text x="216" y="888" class="step-num" text-anchor="middle" style="font-size:9.5px; fill:#0f172a;">Controller</text>
    <text x="260" y="890" class="step-actor" fill="#60a5fa">/data2 重新可分配 &amp; 均衡恢复</text>
    <text x="810" y="890" class="step-time" text-anchor="end">⏱ ~30-60 分钟</text>
    <text x="155" y="915" class="step-text">/data2 重新加入可分配目录列表 → 正常副本均衡</text>
    <text x="155" y="933" class="step-text">Controller 自动触发副本再分配，逐步恢复负载</text>
    <text x="155" y="951" class="step-note">→ ✅ 集群恢复完整 JBOD 容量，维护完成</text>
  </g>

  <!-- ============================================================ -->
  <!-- LEGEND -->
  <!-- ============================================================ -->
  <g transform="translate(130, 990)">
    <rect x="0" y="0" width="700" height="50" rx="6" fill="rgba(30,41,59,0.4)" stroke="#334155" stroke-width="1"/>
    <text x="20" y="30" class="legend-text" fill="#e2e8f0" font-weight="600">图例</text>

    <!-- Admin legend -->
    <rect x="100" y="14" width="16" height="16" rx="3" fill="#34d399"/>
    <text x="124" y="27" class="legend-text" fill="#34d399">Admin 操作</text>

    <!-- Controller legend -->
    <rect x="240" y="14" width="16" height="16" rx="3" fill="#60a5fa"/>
    <text x="264" y="27" class="legend-text" fill="#60a5fa">Controller 操作</text>

    <!-- Time legend -->
    <circle cx="390" cy="22" r="6" fill="none" stroke="#fbbf24" stroke-width="1"/>
    <text x="404" y="27" class="legend-text" fill="#fbbf24">⏱ 预计耗时</text>

    <!-- Flow legend -->
    <line x1="500" y1="22" x2="530" y2="22" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-neutral)"/>
    <text x="538" y="27" class="legend-text" fill="#94a3b8">流程方向</text>
  </g>

  <!-- Total time summary -->
  <text x="480" y="1070" text-anchor="middle" fill="#64748b" font-size="9" font-weight="400">
    预计总耗时：~62-127 分钟 | 关键路径：Admin 操作 (步骤1+3+4+5) = ~22-37 分钟 | Controller 异步处理 (步骤2+6) = ~40-90 分钟
  </text>
</svg>
